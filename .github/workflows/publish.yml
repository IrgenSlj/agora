name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck:cli

      - name: Tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish agora-hub to npm
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          npm publish --tag ${{ github.event.inputs.tag || 'latest' }} --provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # The OpenCode plugin entry is a thin re-export that pins agora-hub to the
      # exact version above — publish it second so the pair stays atomic.
      - name: Publish opencode-agora (plugin entry) to npm
        working-directory: packages/opencode-agora
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          npm publish --tag ${{ github.event.inputs.tag || 'latest' }} --provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
