version: 2
updates:
  # The `bun` ecosystem updates package.json AND bun.lock together. The old
  # `npm` ecosystem bumped package.json but left bun.lock stale, which broke
  # `bun install --frozen-lockfile` in CI.
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'
  - package-ecosystem: 'bun'
    directory: '/backend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore'
      include: 'scope'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore'
      include: 'scope'
